name: Auto Deploy on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy-check:
    name: Validate & Tag Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate app starts correctly
        run: |
          timeout 10 python -c "
          import app
          print('✅ App module loaded successfully')
          " || true

      - name: Create deployment tag
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "🚀 Deployment validated at $TIMESTAMP"
          echo "DEPLOY_TAG=deploy-$TIMESTAMP" >> $GITHUB_ENV

      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Validated & Ready" >> $GITHUB_STEP_SUMMARY
