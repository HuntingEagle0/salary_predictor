name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 py-compile-check

      - name: Lint with flake8 (warnings only)
        run: |
          # Stop the build only on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Validate Python syntax
        run: python -m py_compile app.py

      - name: Verify requirements.txt
        run: pip check || true

      - name: Check static files exist
        run: |
          echo "Checking static assets..."
          ls -la static/ || echo "No static directory found"
